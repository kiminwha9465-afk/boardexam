<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('마이페이지')}"/>
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-4" style="max-width:860px;">

    <!-- 프로필 헤더 카드 -->
    <div class="card mb-4">
        <div class="card-body d-flex align-items-center gap-4 py-4">
            <div class="mypage-avatar" th:text="${#strings.substring(member.nickname, 0, 1)}">N</div>
            <div>
                <h5 class="fw-bold mb-1" th:text="${member.nickname}">닉네임</h5>
                <div class="text-muted small">
                    <span th:text="${member.memberId}">아이디</span>
                    <span class="mx-2">·</span>
                    <span>가입일 <span th:text="${#strings.substring(member.createdAt, 0, 10)}">날짜</span></span>
                    <span class="mx-2">·</span>
                    <span>게시글 <strong th:text="${totalBoards}">0</strong>개</span>
                    <span class="mx-2">·</span>
                    <span>댓글 <strong th:text="${totalComments}">0</strong>개</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 탭 -->
    <ul class="nav nav-tabs mb-0" id="mypageTab">
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${tab == 'profile'} ? ' active' : ''"
               th:href="@{/member/mypage(tab='profile')}">프로필 수정</a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center"
               th:classappend="${tab == 'posts'} ? ' active' : ''"
               th:href="@{/member/mypage(tab='posts')}">
                내 게시글
                <span class="badge bg-secondary ms-1" th:text="${totalBoards}">0</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center"
               th:classappend="${tab == 'comments'} ? ' active' : ''"
               th:href="@{/member/mypage(tab='comments')}">
                내 댓글
                <span class="badge bg-secondary ms-1" th:text="${totalComments}">0</span>
            </a>
        </li>
    </ul>

    <div class="card" style="border-top-left-radius:0; border-top-right-radius:0;">
        <div class="card-body">

            <!-- ===== 프로필 수정 탭 ===== -->
            <div th:if="${tab == 'profile'}">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form th:action="@{/member/update}" method="post" style="max-width:460px;">
                    <div class="mb-3">
                        <label class="form-label">아이디</label>
                        <input type="text" class="form-control" th:value="${member.memberId}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">닉네임</label>
                        <input type="text" name="nickname" class="form-control"
                               th:value="${member.nickname}" required maxlength="20">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">이메일</label>
                        <input type="email" name="email" class="form-control"
                               th:value="${member.email}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">새 비밀번호
                            <small class="text-muted fw-normal">(변경 시에만 입력)</small>
                        </label>
                        <input type="password" name="password" class="form-control"
                               placeholder="새 비밀번호 (8자 이상)" minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary px-4">정보 수정</button>
                </form>
            </div>

            <!-- ===== 내가 작성한 게시글 탭 ===== -->
            <div th:if="${tab == 'posts'}">
                <div th:if="${#lists.isEmpty(boards)}" class="text-center text-muted py-5">
                    작성한 게시글이 없습니다.
                </div>

                <table class="table table-hover mb-0" th:unless="${#lists.isEmpty(boards)}">
                    <thead>
                    <tr>
                        <th>제목</th>
                        <th class="text-center" style="width:100px;">작성일</th>
                        <th class="text-center" style="width:55px;">조회</th>
                        <th class="text-center" style="width:55px;">댓글</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="board : ${boards}" style="cursor:pointer;"
                        onclick="location.href=[['/board/detail/' + ${board.id}]]">
                        <td class="title-cell">
                            <a th:href="@{'/board/detail/' + ${board.id}}"
                               th:text="${board.title}"
                               class="text-decoration-none text-dark">제목</a>
                            <span class="comment-badge" th:if="${board.commentCount > 0}"
                                  th:text="'[' + ${board.commentCount} + ']'"></span>
                        </td>
                        <td class="text-center text-muted small"
                            th:text="${#strings.substring(board.createdAt, 0, 10)}">날짜</td>
                        <td class="text-center text-muted" th:text="${board.viewCount}">0</td>
                        <td class="text-center text-muted" th:text="${board.commentCount}">0</td>
                    </tr>
                    </tbody>
                </table>

                <!-- 페이지네이션 -->
                <div th:if="${boardTotalPages > 1}" class="d-flex justify-content-center mt-3">
                    <ul class="pagination mb-0">
                        <li th:if="${boardPage > 1}">
                            <a class="page-link rounded"
                               th:href="@{/member/mypage(tab='posts', page=${boardPage - 1})}">‹</a>
                        </li>
                        <li th:each="p : ${#numbers.sequence(1, boardTotalPages)}">
                            <a class="page-link rounded"
                               th:classappend="${p == boardPage} ? ' active-page' : ''"
                               th:href="@{/member/mypage(tab='posts', page=${p})}"
                               th:text="${p}">1</a>
                        </li>
                        <li th:if="${boardPage < boardTotalPages}">
                            <a class="page-link rounded"
                               th:href="@{/member/mypage(tab='posts', page=${boardPage + 1})}">›</a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- ===== 내 댓글 탭 ===== -->
            <div th:if="${tab == 'comments'}">
                <div th:if="${#lists.isEmpty(myComments)}" class="text-center text-muted py-5">
                    작성한 댓글이 없습니다.
                </div>

                <table class="table table-hover mb-0" th:unless="${#lists.isEmpty(myComments)}">
                    <thead>
                    <tr>
                        <th>댓글 내용</th>
                        <th style="width:200px;">원본 게시글</th>
                        <th class="text-center" style="width:100px;">작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="comment : ${myComments}" style="cursor:pointer;"
                        onclick="location.href=[['/board/detail/' + ${comment.boardId}]]">
                        <td class="text-truncate" style="max-width:300px;">
                            <a th:href="@{'/board/detail/' + ${comment.boardId}}"
                               th:text="${comment.content}"
                               class="text-decoration-none text-dark">내용</a>
                        </td>
                        <td>
                            <a th:href="@{'/board/detail/' + ${comment.boardId}}"
                               th:text="${comment.boardTitle}"
                               class="text-decoration-none text-muted small">게시글 제목</a>
                        </td>
                        <td class="text-center text-muted small"
                            th:text="${#strings.substring(comment.createdAt, 0, 10)}">날짜</td>
                    </tr>
                    </tbody>
                </table>

                <!-- 페이지네이션 -->
                <div th:if="${commentTotalPages > 1}" class="d-flex justify-content-center mt-3">
                    <ul class="pagination mb-0">
                        <li th:if="${commentPage > 1}">
                            <a class="page-link rounded"
                               th:href="@{/member/mypage(tab='comments', page=${commentPage - 1})}">‹</a>
                        </li>
                        <li th:each="p : ${#numbers.sequence(1, commentTotalPages)}">
                            <a class="page-link rounded"
                               th:classappend="${p == commentPage} ? ' active-page' : ''"
                               th:href="@{/member/mypage(tab='comments', page=${p})}"
                               th:text="${p}">1</a>
                        </li>
                        <li th:if="${commentPage < commentTotalPages}">
                            <a class="page-link rounded"
                               th:href="@{/member/mypage(tab='comments', page=${commentPage + 1})}">›</a>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

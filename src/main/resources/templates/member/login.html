<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('로그인')}"/>
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-5">
    <div class="card mx-auto" style="max-width: 420px;">
        <div class="card-header bg-white fw-bold fs-5 text-center">로그인</div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/member/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" name="memberId" class="form-control"
                           placeholder="아이디를 입력하세요" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">로그인</button>
                </div>
            </form>

            <hr>
            <div class="text-center">
                <small class="text-muted">계정이 없으신가요?
                    <a th:href="@{/member/join}">회원가입</a>
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('회원가입')}"/>
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-5">
    <div class="card mx-auto" style="max-width: 480px;">
        <div class="card-header bg-white fw-bold fs-5 text-center">회원가입</div>
        <div class="card-body p-4">

            <!-- 에러 메시지 -->
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/member/join}" method="post">
                <div class="mb-3">
                    <label class="form-label">아이디 <span class="text-danger">*</span></label>
                    <input type="text" name="memberId" class="form-control"
                           placeholder="영문, 숫자 4~20자" required minlength="4" maxlength="20">
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호 <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control"
                           placeholder="8자 이상" required minlength="8">
                </div>
                <div class="mb-3">
                    <label class="form-label">이메일 <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control"
                           placeholder="example@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">닉네임 <span class="text-danger">*</span></label>
                    <input type="text" name="nickname" class="form-control"
                           placeholder="2~20자" required minlength="2" maxlength="20">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">가입하기</button>
                </div>
            </form>

            <hr>
            <div class="text-center">
                <small class="text-muted">이미 계정이 있으신가요?
                    <a th:href="@{/member/login}">로그인</a>
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

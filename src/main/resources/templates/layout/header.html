<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<!-- head 프래그먼트 -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 게시판'">게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<!-- 네비게이션 바 + 토스트 프래그먼트 -->
<th:block th:fragment="navbar">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/board/list}">📋 게시판</a>
        <ul class="navbar-nav ms-auto flex-row align-items-center gap-2">
            <!-- 비로그인 -->
            <th:block th:if="${session.loginMember == null}">
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/member/login}">로그인</a>
                </li>
            </th:block>

            <!-- 로그인 -->
            <th:block th:unless="${session.loginMember == null}">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false"
                       th:text="${session.loginMember.nickname} + ' 님'">닉네임 님</a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/board/write}">글쓰기</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/member/mypage(tab='profile')}">마이페이지</a></li>
                        <li><a class="dropdown-item" th:href="@{/member/mypage(tab='posts')}">내 게시글</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/member/logout}">로그아웃</a></li>
                    </ul>
                </li>
            </th:block>
        </ul>
    </div>
</nav>

<!-- 플래시 토스트 (고정 레이어) -->
<div th:if="${message}" id="flash-toast" class="flash-toast">
    <span th:text="${message}"></span>
</div>
<script>
    (function() {
        const t = document.getElementById('flash-toast');
        if (!t) return;
        setTimeout(() => t.classList.add('hide'), 2500);
        t.addEventListener('transitionend', () => t.remove());
    })();
</script>
</th:block>

</html>

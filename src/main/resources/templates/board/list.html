<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('게시글 목록')}"/>
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-4">

    <!-- 검색 + 글쓰기 -->
    <div class="card mb-3">
        <div class="card-body py-3">
            <form th:action="@{/board/list}" method="get" class="row g-2 align-items-center">
                <div class="col-auto">
                    <select name="searchType" class="form-select form-select-sm">
                        <option value="title"   th:selected="${page.searchType == 'title'}">제목</option>
                        <option value="content" th:selected="${page.searchType == 'content'}">내용</option>
                        <option value="writer"  th:selected="${page.searchType == 'writer'}">작성자</option>
                        <option value="all"     th:selected="${page.searchType == 'all'}">제목+내용</option>
                    </select>
                </div>
                <div class="col">
                    <input type="text" name="keyword" class="form-control form-control-sm"
                           placeholder="검색어를 입력하세요"
                           th:value="${page.keyword}">
                </div>
                <input type="hidden" name="pageSize" th:value="${page.pageSize}">
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">검색</button>
                    <a th:href="@{/board/list}" class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 게시글 수 + 글쓰기 -->
    <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
        <small class="text-muted">전체 <strong th:text="${page.totalCount}">0</strong>건</small>
        <a th:if="${session.loginMember != null}" th:href="@{/board/write}" class="btn btn-success btn-sm">글쓰기</a>
    </div>

    <!-- 게시글 테이블 -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover board-table mb-0">
                <thead>
                <tr class="text-center">
                    <th style="width:70px">번호</th>
                    <th>제목</th>
                    <th style="width:110px" class="d-none d-md-table-cell">작성자</th>
                    <th style="width:110px" class="d-none d-md-table-cell">작성일</th>
                    <th style="width:70px">조회</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(boards)}">
                    <td colspan="5" class="text-center py-5 text-muted">게시글이 없습니다.</td>
                </tr>
                <tr th:each="board, stat : ${boards}" th:unless="${#lists.isEmpty(boards)}"
                    onclick="location.href=[['/board/detail/' + ${board.id}]]"
                    style="cursor:pointer">
                    <td class="text-center" th:text="${page.totalCount - page.offset - stat.index}">1</td>
                    <td class="title-cell">
                        <a th:href="@{'/board/detail/' + ${board.id}}" th:text="${board.title}">제목</a>
                        <span class="comment-badge" th:if="${board.commentCount > 0}"
                              th:text="'[' + ${board.commentCount} + ']'"></span>
                    </td>
                    <td class="text-center d-none d-md-table-cell" th:text="${board.memberNickname}">작성자</td>
                    <td class="text-center d-none d-md-table-cell"
                        th:text="${#strings.substring(board.createdAt, 0, 10)}">날짜</td>
                    <td class="text-center" th:text="${board.viewCount}">0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav class="mt-3" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <!-- « 첫 페이지 -->
            <li class="page-item">
                <a class="page-link" th:href="@{/board/list(currentPage=1, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">«</a>
            </li>
            <!-- < 이전 페이지 -->
            <li class="page-item">
                <a class="page-link" th:href="@{/board/list(currentPage=${page.currentPage - 1}, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">‹</a>
            </li>

            <!-- 앞 생략 (1 ...) -->
            <th:block th:if="${page.startPage > 1}">
                <li class="page-item">
                    <a class="page-link" th:href="@{/board/list(currentPage=1, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">1</a>
                </li>
                <li class="page-item disabled"><span class="page-link ellipsis">···</span></li>
            </th:block>

            <!-- 페이지 번호 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(page.startPage, page.endPage)}"
                th:classappend="${i == page.currentPage} ? 'active'">
                <a class="page-link" th:text="${i}"
                   th:href="@{/board/list(currentPage=${i}, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">1</a>
            </li>

            <!-- 뒤 생략 (... 마지막) -->
            <th:block th:if="${page.endPage < page.totalPages}">
                <li class="page-item disabled"><span class="page-link ellipsis">···</span></li>
                <li class="page-item">
                    <a class="page-link" th:text="${page.totalPages}"
                       th:href="@{/board/list(currentPage=${page.totalPages}, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">10</a>
                </li>
            </th:block>

            <!-- > 다음 페이지 -->
            <li class="page-item">
                <a class="page-link" th:href="@{/board/list(currentPage=${page.currentPage + 1}, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">›</a>
            </li>
            <!-- » 마지막 페이지 -->
            <li class="page-item">
                <a class="page-link" th:href="@{/board/list(currentPage=${page.totalPages}, pageSize=${page.pageSize}, keyword=${page.keyword}, searchType=${page.searchType})}">»</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const alert = document.querySelector('.alert');
    if (alert) {
        setTimeout(() => {
            alert.classList.remove('show');
            alert.addEventListener('transitionend', () => alert.remove());
        }, 3000);
    }
</script>
</body>
</html>

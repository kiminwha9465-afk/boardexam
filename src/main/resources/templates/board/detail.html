<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head(${board.title})}"/>
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-4">

    <!-- 게시글 -->
    <div class="card mb-4">
        <div class="card-body">
            <!-- 제목 -->
            <h4 class="fw-bold mb-3" th:text="${board.title}">제목</h4>

            <!-- 메타 정보 -->
            <div class="board-meta d-flex flex-wrap gap-3">
                <span>작성자 : <strong th:text="${board.memberNickname}">닉네임</strong></span>
                <span>작성일 : <span th:text="${#strings.substring(board.createdAt, 0, 16)}">날짜</span></span>
                <span>조회수 : <span th:text="${board.viewCount}">0</span></span>
                <span>댓글 : <span th:text="${totalComments}">0</span></span>
            </div>

            <!-- 본문: Quill HTML이면 utext, 아니면 plain text -->
            <div th:if="${#strings.contains(board.content, '<')}"
                 class="board-content ql-editor" th:utext="${board.content}"></div>
            <div th:unless="${#strings.contains(board.content, '<')}"
                 class="board-content" style="white-space: pre-wrap;" th:text="${board.content}"></div>

            <!-- 첨부 이미지 목록 -->
            <div th:if="${!#lists.isEmpty(images)}" class="mt-3">
                <div class="text-muted small mb-1">첨부 이미지 <span th:text="${#lists.size(images)}"></span>장</div>
                <div class="d-flex flex-wrap gap-2">
                    <img th:each="img : ${images}"
                         th:src="@{'/uploads/' + ${img.imagePath}}"
                         class="rounded" style="max-height:200px; object-fit:contain; cursor:pointer;"
                         onclick="window.open(this.src)">
                </div>
            </div>

            <!-- 수정/삭제 버튼 (작성자만) -->
            <div class="d-flex gap-2 mt-3"
                 th:if="${session.loginMember != null and session.loginMember.id == board.memberId}">
                <a th:href="@{'/board/edit/' + ${board.id}}" class="btn btn-warning btn-sm">수정</a>
                <form th:action="@{'/board/delete/' + ${board.id}}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 목록으로 -->
    <div class="mb-4">
        <a th:href="@{/board/list}" class="btn btn-outline-secondary btn-sm">← 목록으로</a>
    </div>

    <!-- 댓글 영역 -->
    <div class="card">
        <div class="card-header bg-white fw-bold">
            댓글 <span class="badge bg-primary" th:text="${totalComments}">0</span>
        </div>
        <div class="card-body">

            <!-- 댓글 목록 -->
            <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted py-3">
                첫 번째 댓글을 남겨보세요!
            </div>

            <div th:each="comment : ${comments}" class="comment-item">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span class="comment-author" th:text="${comment.memberNickname}">닉네임</span>
                        <span class="comment-date ms-2" th:text="${#strings.substring(comment.createdAt, 0, 16)}">날짜</span>
                    </div>
                    <!-- 댓글 삭제 (작성자만) -->
                    <div th:if="${session.loginMember != null and session.loginMember.id == comment.memberId}">
                        <button class="btn btn-link btn-sm text-muted p-0"
                                th:onclick="'toggleEdit(' + ${comment.id} + ')'">수정</button>
                        <form th:action="@{'/comment/delete/' + ${comment.id}}" method="post" class="d-inline">
                            <input type="hidden" name="boardId" th:value="${board.id}">
                            <input type="hidden" name="commentPage" th:value="${commentPage}">
                            <button type="submit" class="btn btn-link btn-sm text-danger p-0 ms-1"
                                    onclick="return confirm('댓글을 삭제하시겠습니까?')">삭제</button>
                        </form>
                    </div>
                </div>
                <!-- 댓글 내용 -->
                <div class="comment-content mt-1" th:id="'content-' + ${comment.id}"
                     th:text="${comment.content}">내용</div>
                <!-- 댓글 수정 폼 (숨김) -->
                <form th:action="@{'/comment/update/' + ${comment.id}}" method="post"
                      th:id="'edit-form-' + ${comment.id}" class="mt-2 d-none">
                    <input type="hidden" name="boardId" th:value="${board.id}">
                    <input type="hidden" name="commentPage" th:value="${commentPage}">
                    <textarea name="content" class="form-control form-control-sm mb-1" rows="2"
                              th:text="${comment.content}"></textarea>
                    <button type="submit" class="btn btn-primary btn-sm">저장</button>
                    <button type="button" class="btn btn-secondary btn-sm"
                            th:onclick="'toggleEdit(' + ${comment.id} + ')'">취소</button>
                </form>
            </div>

            <!-- 댓글 페이지네이션 -->
            <div th:if="${commentTotalPages > 1}" class="d-flex justify-content-center mt-3 mb-2">
                <nav>
                    <ul class="pagination pagination-sm mb-0" style="gap:4px; list-style:none; padding:0; display:flex;">
                        <li th:if="${commentPage > 1}">
                            <a class="page-link rounded"
                               th:href="@{'/board/detail/' + ${board.id} + '?commentPage=' + (${commentPage} - 1)}">‹</a>
                        </li>
                        <li th:each="p : ${#numbers.sequence(1, commentTotalPages)}">
                            <a class="page-link rounded"
                               th:classappend="${p == commentPage} ? ' active-page' : ''"
                               th:href="@{'/board/detail/' + ${board.id} + '?commentPage=' + ${p}}"
                               th:text="${p}">1</a>
                        </li>
                        <li th:if="${commentPage < commentTotalPages}">
                            <a class="page-link rounded"
                               th:href="@{'/board/detail/' + ${board.id} + '?commentPage=' + (${commentPage} + 1)}">›</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- 댓글 입력 폼 (로그인 시) -->
            <div th:unless="${session.loginMember == null}" class="mt-3 border-top pt-3">
                <form th:action="@{/comment/write}" method="post">
                    <input type="hidden" name="boardId" th:value="${board.id}">
                    <div class="input-group">
                        <textarea name="content" class="form-control" rows="2"
                                  placeholder="댓글을 입력하세요" required></textarea>
                        <button type="submit" class="btn btn-primary">등록</button>
                    </div>
                </form>
            </div>

            <!-- 비로그인 안내 -->
            <div th:if="${session.loginMember == null}" class="mt-3 border-top pt-3 text-center text-muted">
                <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleEdit(id) {
        document.getElementById('content-' + id).classList.toggle('d-none');
        document.getElementById('edit-form-' + id).classList.toggle('d-none');
    }
</script>
</body>
</html>

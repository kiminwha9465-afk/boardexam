<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('글쓰기')}"/>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-4">
    <div class="card mx-auto" style="max-width: 900px;">
        <div class="card-header bg-white fw-bold fs-5">글쓰기</div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form id="writeForm" th:action="@{/board/write}" method="post">
                <input type="hidden" name="content" id="content-input">
                <input type="hidden" name="imageFilenames" id="images-input">

                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input type="text" name="title" class="form-control"
                           placeholder="제목을 입력하세요" required maxlength="200">
                </div>

                <div class="mb-3">
                    <label class="form-label">내용</label>
                    <div id="editor" style="height:420px;"></div>
                </div>

                <!-- 첨부 이미지 갤러리 -->
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="form-label mb-0">첨부 이미지</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="triggerUpload()">
                            + 이미지 추가
                        </button>
                        <input type="file" id="fileInput" accept="image/*" multiple class="d-none">
                    </div>
                    <div id="gallery" class="d-flex flex-wrap gap-2"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">등록</button>
                    <a th:href="@{/board/list}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ color: [] }, { background: [] }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    [{ align: [] }],
                    ['link', 'image'],
                    ['clean']
                ],
                handlers: { image: () => triggerUpload() }
            }
        }
    });

    let newFilenames = [];

    function triggerUpload() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        for (const file of e.target.files) {
            const formData = new FormData();
            formData.append('file', file);
            const res  = await fetch('/board/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.error) { alert(data.error); continue; }

            newFilenames.push(data.filename);
            insertImageInEditor(data.url);
            addGalleryItem({ filename: data.filename, url: data.url, id: null });
        }
        e.target.value = '';
    });

    function insertImageInEditor(url) {
        const range = quill.getSelection() || { index: quill.getLength() };
        quill.insertEmbed(range.index, 'image', url);
        quill.setSelection(range.index + 1);
    }

    function addGalleryItem({ filename, url, id }) {
        const gallery = document.getElementById('gallery');
        const div = document.createElement('div');
        div.className = 'position-relative gallery-thumb';
        div.dataset.filename = filename;
        div.innerHTML = `
            <img src="${url}" class="rounded" style="width:100px;height:100px;object-fit:cover;">
            <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 p-0"
                    style="width:20px;height:20px;font-size:11px;line-height:1;"
                    onclick="removeGalleryItem(this, '${url}', null)">×</button>
        `;
        gallery.appendChild(div);
    }

    function removeGalleryItem(btn, url, imageId) {
        btn.closest('.gallery-thumb').remove();
        // 에디터에서 해당 이미지 제거
        const ops = quill.getContents().ops.filter(op =>
            !(op.insert && typeof op.insert === 'object' && op.insert.image === url)
        );
        quill.setContents(ops);
        // 파일명 목록에서 제거
        const filename = btn.closest('.gallery-thumb').dataset.filename;
        newFilenames = newFilenames.filter(f => f !== filename);
    }

    document.getElementById('writeForm').addEventListener('submit', (e) => {
        document.getElementById('content-input').value = quill.root.innerHTML;
        document.getElementById('images-input').value  = newFilenames.join(',');
    });
</script>
</body>
</html>

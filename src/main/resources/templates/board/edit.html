<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/header :: head('게시글 수정')}"/>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{layout/header :: navbar}"></div>

<div class="container my-4">
    <div class="card mx-auto" style="max-width: 900px;">
        <div class="card-header bg-white fw-bold fs-5">게시글 수정</div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form id="editForm" th:action="@{'/board/edit/' + ${board.id}}" method="post">
                <input type="hidden" name="content" id="content-input">
                <input type="hidden" name="imageFilenames" id="images-input">

                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input type="text" name="title" class="form-control"
                           th:value="${board.title}" required maxlength="200">
                </div>

                <div class="mb-3">
                    <label class="form-label">내용</label>
                    <div id="editor" style="height:420px;"></div>
                </div>

                <!-- 첨부 이미지 갤러리 -->
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="form-label mb-0">첨부 이미지</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="triggerUpload()">
                            + 이미지 추가
                        </button>
                        <input type="file" id="fileInput" accept="image/*" multiple class="d-none">
                    </div>
                    <div id="gallery" class="d-flex flex-wrap gap-2">
                        <!-- 기존 이미지 -->
                        <div th:each="img : ${images}"
                             class="position-relative gallery-thumb"
                             th:data-filename="${img.imagePath}">
                            <img th:src="@{'/uploads/' + ${img.imagePath}}"
                                 class="rounded" style="width:100px;height:100px;object-fit:cover;">
                            <button type="button"
                                    class="btn btn-danger btn-sm position-absolute top-0 end-0 p-0"
                                    style="width:20px;height:20px;font-size:11px;line-height:1;"
                                    th:data-image-id="${img.id}"
                                    th:data-image-path="${img.imagePath}"
                                    onclick="removeExistingImage(this)">×</button>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">수정 완료</button>
                    <a th:href="@{'/board/detail/' + ${board.id}}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script th:inline="javascript">
    const existingContent = /*[[${board.content}]]*/ '';

    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ color: [] }, { background: [] }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    [{ align: [] }],
                    ['link', 'image'],
                    ['clean']
                ],
                handlers: { image: () => triggerUpload() }
            }
        }
    });

    if (existingContent) {
        // Quill HTML이면 innerHTML로, 일반 텍스트면 setText로 로드
        if (existingContent.includes('<')) {
            quill.root.innerHTML = existingContent;
        } else {
            quill.setText(existingContent);
        }
    }

    let newFilenames = [];

    function triggerUpload() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        for (const file of e.target.files) {
            const formData = new FormData();
            formData.append('file', file);
            const res  = await fetch('/board/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.error) { alert(data.error); continue; }

            newFilenames.push(data.filename);
            insertImageInEditor(data.url);
            addNewGalleryItem({ filename: data.filename, url: data.url });
        }
        e.target.value = '';
    });

    function insertImageInEditor(url) {
        const range = quill.getSelection() || { index: quill.getLength() };
        quill.insertEmbed(range.index, 'image', url);
        quill.setSelection(range.index + 1);
    }

    function addNewGalleryItem({ filename, url }) {
        const gallery = document.getElementById('gallery');
        const div = document.createElement('div');
        div.className = 'position-relative gallery-thumb';
        div.dataset.filename = filename;
        div.innerHTML = `
            <img src="${url}" class="rounded" style="width:100px;height:100px;object-fit:cover;">
            <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 p-0"
                    style="width:20px;height:20px;font-size:11px;line-height:1;"
                    onclick="removeNewImage(this, '${url}', '${filename}')">×</button>
        `;
        gallery.appendChild(div);
    }

    // 기존 이미지 삭제 (서버 API 호출)
    async function removeExistingImage(btn) {
        if (!confirm('이미지를 삭제하시겠습니까?')) return;
        const imageId  = btn.dataset.imageId;
        const imageUrl = '/uploads/' + btn.dataset.imagePath;
        const res  = await fetch('/board/image/delete/' + imageId, { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
            btn.closest('.gallery-thumb').remove();
            removeFromEditor(imageUrl);
        }
    }

    // 새로 업로드한 이미지 제거 (서버 저장 전)
    function removeNewImage(btn, url, filename) {
        btn.closest('.gallery-thumb').remove();
        removeFromEditor(url);
        newFilenames = newFilenames.filter(f => f !== filename);
    }

    function removeFromEditor(url) {
        const ops = quill.getContents().ops.filter(op =>
            !(op.insert && typeof op.insert === 'object' && op.insert.image === url)
        );
        quill.setContents(ops);
    }

    document.getElementById('editForm').addEventListener('submit', () => {
        document.getElementById('content-input').value = quill.root.innerHTML;
        document.getElementById('images-input').value  = newFilenames.join(',');
    });
</script>
</body>
</html>
